name: Deploy Flet App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet

      - name: Build Flet Web App
        run: |
          # Uses main.py directly at the root, matching your repo name: /susanportfolio/
          flet publish main.py --base-url /susanportfolio/

      - name: Upload web assets
        uses: actions/upload-pages-artifact@v3
        with:
          # Flet outputs to 'dist/' at the root because main.py is at the root
          path: dist/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
